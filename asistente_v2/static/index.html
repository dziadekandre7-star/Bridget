<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content">
    <title>RICK</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="header">RICK // SISTEMA ACTIVO</div>

    <div id="chat"></div>

    <div id="input-area">
        <button id="attach">📎</button>
        <textarea id="input" placeholder=">" autocomplete="off"></textarea>
        <button id="mic">🎙️</button>
        <button id="handsfree" title="Modo manos libres">🤚</button>
        <button id="send">ENVIAR</button>
    </div>

    <!-- Modal de Inbox -->
    <div id="inbox-modal">
        <div id="modal-content">
            <div id="modal-header">
                <span>📁 INBOX</span>
                <button id="modal-close">✕</button>
            </div>
            <div id="modal-body">
                <div id="drop-zone">
                    📤 Arrastra archivos aquí<br>
                    <span style="font-size: 10px; color: #00ff8866;">.py .txt .md .json</span>
                </div>
                <div id="files-list"></div>
                <div id="selected-info">Sin archivo seleccionado</div>
            </div>
        </div>
    </div>

    <input id="file-input" type="file" accept=".py,.txt,.md,.json" multiple>

    <script src="/static/js/app.js"></script>
</body>
</html>
