<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RICK</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a0f;
            color: #00ff88;
            font-family: 'Courier New', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        #header {
            padding: 15px;
            border-bottom: 1px solid #00ff8844;
            text-align: center;
            letter-spacing: 8px;
            font-size: 14px;
            color: #00ff88;
            text-shadow: 0 0 10px #00ff88;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .mensaje {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 4px;
            font-size: 14px;
            line-height: 1.5;
        }

        .usuario {
            align-self: flex-end;
            background: #001a0a;
            border: 1px solid #00ff8844;
            color: #00ff88;
        }

        .rick {
            align-self: flex-start;
            background: #0a001a;
            border: 1px solid #8800ff44;
            color: #cc88ff;
        }

        .rick .nombre {
            font-size: 11px;
            color: #8800ff;
            margin-bottom: 5px;
            letter-spacing: 3px;
        }

        #input-area {
            padding: 15px;
            border-top: 1px solid #00ff8844;
            display: flex;
            gap: 10px;
        }

        #input {
            flex: 1;
            background: #0a0a0f;
            border: 1px solid #00ff8844;
            color: #00ff88;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            outline: none;
            border-radius: 4px;
        }

        #input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 8px #00ff8844;
        }

        #send {
            background: transparent;
            border: 1px solid #00ff88;
            color: #00ff88;
            padding: 12px 20px;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            border-radius: 4px;
            transition: all 0.2s;
        }

        #send:hover {
            background: #00ff8822;
            box-shadow: 0 0 10px #00ff8844;
        }

        .cargando {
            color: #00ff8866;
            font-size: 12px;
            letter-spacing: 3px;
        }
    </style>
</head>
<body>
    <div id="header">RICK // SISTEMA ACTIVO</div>
    
    <div id="chat"></div>
    
    <div id="input-area">
        <input id="input" type="text" placeholder=">" autocomplete="off" />
        <button id="send">ENVIAR</button>
    </div>

    <script>
        const API_URL = "https://cling-immodest-case.ngrok-free.dev/chat";
        const API_KEY = "kyy007351andy's#key";
        
        const chat = document.getElementById("chat");
        const input = document.getElementById("input");
        const send = document.getElementById("send");

        function agregarMensaje(texto, tipo) {
            const div = document.createElement("div");
            div.className = `mensaje ${tipo}`;
            if (tipo === "rick") {
                div.innerHTML = `<div class="nombre">RICK //</div>${texto}`;
            } else {
                div.textContent = texto;
            }
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
        }

        async function enviar() {
            const texto = input.value.trim();
            if (!texto) return;
            
            agregarMensaje(texto, "usuario");
            input.value = "";

            const cargando = document.createElement("div");
            cargando.className = "mensaje rick cargando";
            cargando.textContent = "procesando...";
            chat.appendChild(cargando);

            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "x-api-key": API_KEY
                    },
                    body: JSON.stringify({ texto })
                });
                const data = await res.json();
                chat.removeChild(cargando);
                agregarMensaje(data.respuesta, "rick");
            } catch (e) {
                chat.removeChild(cargando);
                agregarMensaje("Error de conexión.", "rick");
            }
        }

        send.addEventListener("click", enviar);
        input.addEventListener("keypress", e => {
            if (e.key === "Enter") enviar();
        });
    </script>
</body>
</html>
