<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="css/presencia.css">
</head>
<body>
  <!-- Botón para abrir/cerrar el panel -->
  <button id="btn-panel" aria-label="Abrir editor">☰</button>

  <!-- Panel lateral del editor -->
  <aside id="panel">
    <h1 class="panel-titulo">EDITOR</h1>

    <div class="control">
      <label>Color <span id="v-color">40, 140, 150</span></label>
      <div class="preview-color" id="preview-color"></div>
      <div class="rgb-fila">
        <span class="rgb-letra">R</span>
        <input type="range" id="s-r" min="0" max="255" value="40" step="1">
      </div>
      <div class="rgb-fila">
        <span class="rgb-letra">G</span>
        <input type="range" id="s-g" min="0" max="255" value="140" step="1">
      </div>
      <div class="rgb-fila">
        <span class="rgb-letra">B</span>
        <input type="range" id="s-b" min="0" max="255" value="150" step="1">
      </div>
    </div>

    <div class="control">
      <label>Opacidad del fondo <span id="v-opac">65</span></label>
      <input type="range" id="s-opac" min="0" max="100" value="65" step="5">
    </div>

    <div class="control">
      <label>Cantidad <span id="v-cant">140</span></label>
      <input type="range" id="s-cant" min="20" max="400" value="140" step="10">
    </div>

    <div class="control">
      <label>Dispersión <span id="v-disp">100</span></label>
      <input type="range" id="s-disp" min="40" max="200" value="100" step="5">
    </div>

    <div class="control">
      <label>Velocidad <span id="v-vel">100</span></label>
      <input type="range" id="s-vel" min="10" max="300" value="100" step="10">
    </div>

    <div class="control">
      <label>Tamaño partícula <span id="v-sz">100</span></label>
      <input type="range" id="s-sz" min="30" max="260" value="100" step="10">
    </div>

    <div class="control">
      <label>Reacción a la voz <span id="v-react">100</span></label>
      <input type="range" id="s-react" min="0" max="220" value="100" step="10">
    </div>

    <div class="control">
      <label>Núcleo <span id="v-core">100</span></label>
      <input type="range" id="s-core" min="0" max="300" value="100" step="10">
    </div>

    <div class="control">
      <label>Achatamiento <span id="v-flat">78</span></label>
      <input type="range" id="s-flat" min="40" max="100" value="78" step="2">
    </div>
  </aside>

  <!-- Zona de la presencia -->
  <main id="escenario">
    <canvas id="bcanvas"></canvas>
    <div id="blabel">BRIDGET</div>
  </main>

  <script src="js/presencia.js"></script>
</body>
</html>
